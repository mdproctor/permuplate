<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} — {% endif %}Permuplate</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/base16/material-darker.min.css" />

  <link rel="stylesheet" href="{{ '/css/main.css' | relative_url }}" />
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="{{ '/' | relative_url }}" class="nav-logo">
        Permu<span>plate</span>
        <svg class="nav-logo-glyph" viewBox="0 0 160 44" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="1" y="2" width="32" height="40" fill="#111" stroke="#e85d04" stroke-width="1.5"/>
          <rect x="7" y="8"  width="2" height="12" fill="#e85d04" opacity="0.9"/>
          <rect x="11" y="9"  width="18" height="2" rx="0.5" fill="#e85d04" opacity="0.55"/>
          <rect x="11" y="13" width="14" height="2" rx="0.5" fill="#e85d04" opacity="0.35"/>
          <rect x="11" y="17" width="16" height="2" rx="0.5" fill="#e85d04" opacity="0.22"/>
          <rect x="7" y="26" width="22" height="2" rx="0.5" fill="#3a3a3a"/>
          <rect x="7" y="30" width="2"  height="8"  fill="#e85d04" opacity="0.75"/>
          <rect x="11" y="31" width="18" height="2" rx="0.5" fill="#e85d04" opacity="0.4"/>
          <rect x="11" y="35" width="14" height="2" rx="0.5" fill="#2e2e2e"/>
          <rect x="37" y="20" width="26" height="4" fill="#e85d04"/>
          <polygon points="63,14 74,22 63,30" fill="#e85d04"/>
          <rect x="80"  y="6"  width="20" height="28" fill="#101010" stroke="#222"    stroke-width="0.75"/>
          <rect x="86"  y="8"  width="20" height="28" fill="#131313" stroke="#262626" stroke-width="0.75"/>
          <rect x="92"  y="10" width="20" height="28" fill="#161616" stroke="#2c2c2c" stroke-width="0.75"/>
          <rect x="98"  y="12" width="20" height="28" fill="#191919" stroke="#333"    stroke-width="0.75"/>
          <rect x="104" y="14" width="20" height="28" fill="#1c1c1c" stroke="#484848" stroke-width="1"/>
          <rect x="107" y="19" width="14" height="2" rx="0.5" fill="#2c2c2c"/>
          <rect x="107" y="23" width="11" height="2" rx="0.5" fill="#282828"/>
          <rect x="107" y="27" width="13" height="2" rx="0.5" fill="#2c2c2c"/>
          <rect x="107" y="31" width="9"  height="2" rx="0.5" fill="#282828"/>
        </svg>
      </a>
      <ul class="nav-links">
        <li><a href="{{ '/docs.html' | relative_url }}">Docs</a></li>
        <li><a href="{{ '/blog.html' | relative_url }}">Blog</a></li>
        <li><a href="https://github.com/mdproctor/permuplate" target="_blank">GitHub</a></li>
        <li><a href="{{ '/docs.html' | relative_url }}" class="nav-cta">Get Started →</a></li>
      </ul>
    </div>
  </nav>

  {{ content }}

  <footer class="footer">
    <div class="footer-inner">
      <span class="footer-logo">Permuplate</span>
      <div class="footer-tagline">Press once. Print many.</div>
      <div class="footer-links">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/docs.html' | relative_url }}">Docs</a>
        <a href="{{ '/blog.html' | relative_url }}">Blog</a>
        <a href="https://github.com/mdproctor/permuplate" target="_blank">GitHub</a>
        <a href="https://github.com/mdproctor/permuplate/blob/main/LICENSE" target="_blank">Apache 2.0</a>
      </div>
      <div class="footer-bottom">
        <span class="footer-copy">Permuplate — Java annotation processor for arity permutations.</span>
        <span class="footer-license">Apache-2.0</span>
      </div>
    </div>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/java.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('pre code').forEach(function(el) {
        hljs.highlightElement(el);
      });
    });
  </script>

</body>
</html>
